name: Continuous Integration

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v4
      - name: Install Chromium Library Dependencies
        run: |
          sh ./.github/workflows/chromium-lib-install.sh
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # https://github.com/puppeteer/puppeteer/issues/10388#issuecomment-2424197416
      - name: Cache Puppeteer Browser
        uses: actions/cache@v4
        with:
          path: .cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            puppeteer-${{ runner.os }}-
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: latest
      - name: Installing project dependencies
        run: |
          yarn install --frozen-lockfile
      - name: Install Puppeteer Browser
        run: |
          rm -rf .cache/puppeteer/chrome/linux-*/chrome-linux64
          npx puppeteer browsers install chrome
      - name: Lint
        run: |
          yarn lint
      - name: Check Formatting
        run: |
          yarn run format:check
      - name: Test
        run: |
          yarn test
      - name: Build
        run: |
          yarn clean && yarn build
      - name: Commitlint Check
        if: github.event_name == 'push'
        run: yarn commit:lint
